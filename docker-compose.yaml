services:
  postgres:
    image: docker.io/library/postgres:18.4-alpine
    container_name: go-api-using-chi-postgre
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
